remote_theme: just-the-docs/just-the-docs@v0.10.1

title: "HCP"
description: "Harness Communication Protocol"

url: ""
baseurl: "/Harness-Communication-Protocol"

# Aux links (top right)
aux_links:
  "GitHub":
    - "https://github.com/HarnessCommunicationProtocol/Harness-Communication-Protocol"

aux_links_new_tab: true

# Navigation
nav_enabled: true

# Footer
footer_content: "HCP is licensed under <a href=\"https://github.com/HarnessCommunicationProtocol/Harness-Communication-Protocol/blob/main/LICENSE\">Apache License 2.0</a>."

# Color scheme
color_scheme: light

# Search
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Exclude from processing
exclude:
  - core-concepts-reference/
  - discuss/
  - examples/
  - extensions/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - README.zh.md

# Plugins
plugins:
  - jekyll-remote-theme

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
